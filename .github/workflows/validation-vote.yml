name: Validation Vote

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  tally-validation:
    runs-on: ubuntu-latest
    concurrency:
      group: validation-${{ github.event.issue.number }}
      cancel-in-progress: false
    if: |
      startsWith(github.event.comment.body, '/vote approve') ||
      startsWith(github.event.comment.body, '/vote decline') ||
      startsWith(github.event.comment.body, '/vote defer') ||
      startsWith(github.event.comment.body, '/vote approve-with-conditions')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Tally validation votes
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          QUORUM: '3'
        with:
          script: |
            const fs = require('fs');
            let quorum;
            try {
              const config = JSON.parse(fs.readFileSync('data/committee-config.json', 'utf8'));
              quorum = Math.floor(config.members.length / 2) + 1;
            } catch (e) {
              quorum = parseInt(process.env.QUORUM);
            }

            // SEC-003: Verify commenter is an org member/collaborator
            const validAssociations = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            const association = context.payload.comment.author_association;
            if (!validAssociations.includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.payload.comment.user.login} Only organization members, owners, or collaborators can perform this action.`
              });
              return;
            }

            // =============================================================
            // P0-1: Phase Guard -- validation vote only allowed in validation-vote phase
            // =============================================================
            const currentLabels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            })).data.map(l => l.name);

            const allowedPhases = ['status:validation-vote'];
            if (!currentLabels.some(l => allowedPhases.includes(l))) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  `@${context.payload.comment.user.login} Validation voting is not allowed in the current phase.`,
                  '',
                  `This issue must have the label: ${allowedPhases.join(', ')}.`,
                  `Current labels: ${currentLabels.join(', ') || '(none)'}`,
                  '',
                  'The escalation vote must be completed first (resulting in "not escalated") before validation voting begins.',
                  '',
                  '---',
                  '*Phase guard: automated safety check.*'
                ].join('\n')
              });
              return;
            }

            // Fetch all comments
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // SEC-012: Exclude issue author from voting
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const submitter = issue.data.user.login;

            // Tally votes (one per unique user, last vote wins)
            const votes = {};
            for (const c of comments) {
              if (c.user.type === 'Bot') continue;
              if (c.user.login === submitter) continue;  // SEC-012
              const voterId = c.user.login;
              const body = c.body.trim();
              if (/^\/vote approve-with-conditions\s*$/.test(body)) votes[voterId] = 'approve-with-conditions';
              else if (/^\/vote approve\s*$/.test(body)) votes[voterId] = 'approve';
              else if (/^\/vote decline\s*$/.test(body)) votes[voterId] = 'decline';
              else if (/^\/vote defer\s*$/.test(body)) votes[voterId] = 'defer';
            }

            const approve = Object.values(votes).filter(v => v === 'approve').length;
            const approveWithConditions = Object.values(votes).filter(v => v === 'approve-with-conditions').length;
            const decline = Object.values(votes).filter(v => v === 'decline').length;
            const defer = Object.values(votes).filter(v => v === 'defer').length;
            const totalVotes = approve + approveWithConditions + decline + defer;

            // SEC-008: Rate limit - skip if bot posted a tally within last 5 minutes
            const recentBotTally = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              (c.body.includes('Vote Tally') || c.body.includes('Vote —')) &&
              (Date.now() - new Date(c.created_at).getTime()) < 300000
            );
            if (recentBotTally && totalVotes < quorum) {
              return; // Skip posting duplicate tally
            }

            if (totalVotes < quorum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `**Validation Vote Tally** -- ${totalVotes}/${quorum} votes cast (quorum not yet reached)\n\n| | Count |\n|---|---|\n| Approve | ${approve} |\n| Approve with Conditions | ${approveWithConditions} |\n| Decline | ${decline} |\n| Defer | ${defer} |`
              });
              return;
            }

            // SEC-010: Strict majority (>50% of votes cast) required for a
            // decisive outcome. Ties or no-majority default to DEFERRED.
            // Approve and approve-with-conditions combine for the majority
            // calculation; if combined approves reach majority, prefer
            // with-conditions when its count is >= unconditional approves.
            const majorityThreshold = Math.floor(totalVotes / 2) + 1;
            const allApprove = approve + approveWithConditions;
            let outcome, outcomeLabel;
            if (allApprove >= majorityThreshold) {
              if (approveWithConditions >= approve) {
                outcome = 'APPROVED_WITH_CONDITIONS';
                outcomeLabel = 'status:approved-with-conditions';
              } else {
                outcome = 'APPROVED';
                outcomeLabel = 'status:approved';
              }
            } else if (decline >= majorityThreshold) {
              outcome = 'DECLINED';
              outcomeLabel = 'status:declined';
            } else {
              outcome = 'DEFERRED';
              outcomeLabel = 'status:deferred';
            }

            // Remove old status labels, apply outcome
            const statusLabels = currentLabels.filter(l => l.startsWith('status:'));
            for (const sl of statusLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: sl
                });
              } catch (e) { /* ok */ }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [outcomeLabel]
            });

            const outcomeMessage = {
              APPROVED: 'This project has been **approved** by the Open Source Committee. The submitter will be contacted with next steps.',
              APPROVED_WITH_CONDITIONS: 'This project has been **approved with conditions** by the Open Source Committee. The submitter must address the conditions noted by committee members before proceeding.',
              DEFERRED: 'This submission has been **deferred**. The submitter should provide additional information or clarification.',
              DECLINED: 'This submission has been **declined** by the Open Source Committee.'
            };

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `### Validation Vote -- Result: ${outcome}`,
                '',
                `| | Count |`,
                `|---|---|`,
                `| Approve | ${approve} |`,
                `| Approve with Conditions | ${approveWithConditions} |`,
                `| Decline | ${decline} |`,
                `| Defer | ${defer} |`,
                '',
                `Quorum: ${quorum} | Total votes: ${totalVotes}`,
                '',
                outcomeMessage[outcome],
                '',
                '---',
                '*Automated validation vote result.*'
              ].join('\n')
            });

            // Close issue if declined
            if (outcome === 'DECLINED') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }
